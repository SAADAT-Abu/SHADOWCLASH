name: Build desktop bundles

# Builds standalone SHADOWCLASH bundles for Windows, macOS (Apple Silicon and
# Intel), and Linux. Runs on demand or when a v* tag is pushed; tag builds
# also attach the zips to a GitHub release.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write  # required for the release-attach step

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: macos-latest
            label: macos-arm64
          # No macos-intel target: GitHub retired Intel Mac runners, and
          # PyInstaller cannot cross-build x86_64 from arm64. Intel Mac
          # users run from source (see README).
          - os: ubuntu-22.04
            label: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build bundle
        run: pyinstaller shadowclash.spec

      - name: Smoke test
        shell: bash
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: ./dist/shadowclash/shadowclash --help

      - name: Zip bundle
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a ../shadowclash-${{ matrix.label }}.zip shadowclash
          else
            zip -qr ../shadowclash-${{ matrix.label }}.zip shadowclash
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: shadowclash-${{ matrix.label }}
          path: shadowclash-${{ matrix.label }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: shadowclash-${{ matrix.label }}.zip
